        const TypewriterLog = ({ lines }) => {
            const [displayed, setDisplayed] = useState([]);
            const timeoutsRef = useRef([]);

            useEffect(() => {
                timeoutsRef.current.forEach(clearTimeout);
                timeoutsRef.current = [];
                setDisplayed([]);

                let lineIdx = 0;
                let charIdx = 0;

                const schedule = (fn, delay) => {
                    const id = setTimeout(fn, delay);
                    timeoutsRef.current.push(id);
                    return id;
                };

                const typeNext = () => {
                    if (lineIdx >= lines.length) return;
                    const line = lines[lineIdx];
                    const current = line.substring(0, charIdx + 1);
                    setDisplayed(prev => {
                        const next = [...prev];
                        next[lineIdx] = current;
                        return next;
                    });
                    charIdx++;
                    if (charIdx > line.length) {
                        lineIdx++;
                        charIdx = 0;
                        schedule(typeNext, 180);
                    } else {
                        schedule(typeNext, 22);
                    }
                };

                schedule(typeNext, 300);

                return () => {
                    timeoutsRef.current.forEach(clearTimeout);
                    timeoutsRef.current = [];
                };
            }, [lines]);

        // ============================================================
        // VISUALIZADOR DE MAPA MENTAL VIVO v4.2 - VIZINHANCA DIRETA
        // ============================================================
        const MindMapView = ({ onBack }) => {
            const [activeNodeId, setActiveNodeId] = useState(null);
            const containerRef = useRef(null);
            const [mobileLayout, setMobileLayout] = useState(false);

            useEffect(() => {
                const handleResize = () => setMobileLayout(window.innerWidth < 768);
                handleResize();
                window.addEventListener('resize', handleResize);
                return () => window.removeEventListener('resize', handleResize);
            }, []);

            const getNodeData = (id) => {
                const mod = modules.find(m => m.id === id);
                return mod ? { ...mod, label: mod.title.split(' ')[0] } : null;
            };

            const getPos = (desktopX, desktopY, mobileX, mobileY) => {
                return mobileLayout ? { x: mobileX, y: mobileY } : { x: desktopX, y: desktopY };
            };

            const topologyData = {
                nodes: {
                    reset:         { ...getNodeData('smart_reset'),      ...getPos(150, 150,  150, 250) },
                    status:        { ...getNodeData('status_guide'),     ...getPos(375, 150,  150, 400) },
                    multicore:     { ...getNodeData('multicore'),        ...getPos(600, 150,  300, 100) },
                    selector:      { ...getNodeData('region_selector'),  ...getPos(825, 150,  450, 250) },
                    debug:         { ...getNodeData('debug_profile'),    ...getPos(1050, 150, 450, 400) },
                    
                    depth:         { ...getNodeData('depth_adapt'),      ...getPos(150, 400,  150, 700) },
                    symmetry:      { ...getNodeData('symmetry'),         ...getPos(375, 400,  450, 700) },
                    core:          { ...getNodeData('core'),             ...getPos(600, 400,  300, 550) },
                    time:          { ...getNodeData('time_adapt'),       ...getPos(825, 400,  150, 850) },
                    taunts:        { ...getNodeData('regional_taunts'),  ...getPos(1050, 400, 450, 850) },
                    
                    telemetry:     { ...getNodeData('telemetry'),        ...getPos(466, 700,  300, 1000) },
                    context:       { ...getNodeData('context_speech'),   ...getPos(733, 700,  300, 1450) },
                    coach:         { ...getNodeData('coach'),            ...getPos(200, 700,  150, 1150) },
                    enhanced:      { ...getNodeData('context_enhanced'), ...getPos(1000, 700, 300, 1600) },
                    
                    consolidation: { ...getNodeData('consolidation'),    ...getPos(466, 1000, 450, 1150) },
                    persistence:   { ...getNodeData('state_persistence'),...getPos(733, 1000, 300, 1300) },
                    
                    edge:          { ...getNodeData('edge_intelligence'),...getPos(150, 1300, 150, 1750) },
                    book:          { ...getNodeData('opening_book'),     ...getPos(375, 1300, 450, 1750) },
                    ranking:       { ...getNodeData('ranking_profiles'), ...getPos(600, 1300, 300, 1900) },
                    online:        { ...getNodeData('online_realtime'),  ...getPos(825, 1300, 450, 2050) }
                },
                connections: [
                    { from: 'multicore', to: 'core', desc: 'Distribuicao Chunks' },
                    { from: 'core', to: 'telemetry', desc: 'Envio Metricas' },
                    { from: 'core', to: 'depth', desc: 'Ajuste Horizonte' },
                    { from: 'core', to: 'time', desc: 'Orcamento Tempo' },
                    { from: 'core', to: 'symmetry', desc: 'Filtro Geometrico' },
                    { from: 'core', to: 'book', desc: 'Zobrist Lookup' },
                    { from: 'book', to: 'edge', desc: 'Miss -> Nuvem' },
                    { from: 'edge', to: 'telemetry', desc: 'Metricas Nuvem' },
                    { from: 'telemetry', to: 'coach', desc: 'Dados Partida' },
                    { from: 'multicore', to: 'consolidation', desc: 'Merge Pesos' },
                    { from: 'telemetry', to: 'persistence', desc: 'Sync Cloud' },
                    { from: 'consolidation', to: 'persistence', desc: 'Salvar Hibrido' },
                    { from: 'persistence', to: 'ranking', desc: 'Update Elo' },
                    { from: 'online', to: 'ranking', desc: 'PvP Result' },
                    { from: 'online', to: 'persistence', desc: 'Sync Board' },
                    { from: 'core', to: 'context', desc: 'Estado -> Fala' },
                    { from: 'context', to: 'enhanced', desc: 'Analise Extra' },
                    { from: 'context', to: 'taunts', desc: 'Modulador' },
                    { from: 'selector', to: 'taunts', desc: 'Preferencia' },
                    { from: 'status', to: 'core', desc: 'Monitor' },
                    { from: 'core', to: 'debug', desc: 'Variaveis Livres' },
                    { from: 'reset', to: 'multicore', desc: 'Purga Memoria' }
                ]
            };

            // LOGICA DE VIZINHANCA DIRETA (1o grau) - mais suave
            // Apenas nos com aresta DIRETA (entrando ou saindo) do no clicado
            const { activeConnections, directNeighborIds } = useMemo(() => {
                if (!activeNodeId) return { activeConnections: [], directNeighborIds: new Set() };
                
                const directConns = topologyData.connections.filter(
                    c => c.from === activeNodeId || c.to === activeNodeId
                );
                
                const neighborIds = new Set();
                directConns.forEach(c => {
                    if (c.from === activeNodeId) neighborIds.add(c.to);
                    if (c.to === activeNodeId) neighborIds.add(c.from);
                });
                
                return { activeConnections: directConns, directNeighborIds: neighborIds };
            }, [activeNodeId]);

            const padding = 80; 
            const nodesArr = Object.values(topologyData.nodes);
            const minX = Math.min(...nodesArr.map(n => n.x));
            const maxX = Math.max(...nodesArr.map(n => n.x));
            const minY = Math.min(...nodesArr.map(n => n.y));
            const maxY = Math.max(...nodesArr.map(n => n.y));
            const vbWidth = (maxX - minX) + (padding * 2);
            const vbHeight = (maxY - minY) + (padding * 2);
            const viewBox = `${minX - padding} ${minY - padding} ${vbWidth} ${vbHeight}`;

            const handleNodeClick = useCallback((key) => {
                setActiveNodeId(prev => prev === key ? null : key);
            }, []);

            // Helper: verifica se um no esta ativo (selecionado ou vizinho direto)
            const isNodeActive = (key) => {
                if (!activeNodeId) return false;
                return key === activeNodeId || directNeighborIds.has(key);
            };

            return (
                <div className="absolute inset-0 z-50 flex flex-col animate-in">
                    <div 
                        ref={containerRef} 
                        className="flex-1 w-full h-full relative overflow-hidden bg-[#050a10]"
                        onClick={(e) => {
                            if (e.target === e.currentTarget && activeNodeId) setActiveNodeId(null);
                        }}
                    >
                         <div className="w-full h-full flex flex-col items-center justify-center pointer-events-none p-2 md:p-6">
                             <svg 
                                viewBox={viewBox} 
                                preserveAspectRatio="xMidYMid meet" 
                                className="pointer-events-auto block drop-shadow-2xl w-full h-full"
                                style={{ 
                                    background: 'radial-gradient(circle at 50% 20%, rgba(15,23,42,0.8) 0%, rgba(5,10,16,1) 80%)',
                                    borderRadius: mobileLayout ? '0px' : '24px',
                                    border: mobileLayout ? 'none' : '1px solid rgba(51, 65, 85, 0.4)'
                                }}
                                onClick={(e) => { if (e.target === e.currentTarget && activeNodeId) setActiveNodeId(null); }}
                             >
                                <defs>
                                    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
                                        <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(255,255,255,0.02)" strokeWidth="1"/>
                                    </pattern>
                                </defs>
                                <rect x={minX - padding} y={minY - padding} width={vbWidth} height={vbHeight} fill="url(#grid)" />

                                {/* CONEXOES - agora so as diretas ao no clicado brilham */}
                                {topologyData.connections.map((conn, i) => {
                                    const start = topologyData.nodes[conn.from];
                                    const end = topologyData.nodes[conn.to];
                                    if(!start || !end) return null; 
                                    
                                    // Aresta ativa = faz parte das conexoes diretas do no clicado
                                    const isActive = activeNodeId && (
                                        (conn.from === activeNodeId && directNeighborIds.has(conn.to)) ||
                                        (conn.to === activeNodeId && directNeighborIds.has(conn.from))
                                    );
                                    
                                    // Aresta suave = nao tem nada selecionado, ou nao e direta mas existe
                                    const isRevealed = !activeNodeId; // sem selecao, tudo visivel normalmente
                                    const hexColor = getColor(start.color).hex;

                                    const isHorizontal = Math.abs(start.y - end.y) < 50;
                                    let pathD;
                                    if (isHorizontal) {
                                        const midX = (start.x + end.x) / 2;
                                        pathD = `M${start.x},${start.y} C${midX},${start.y} ${midX},${end.y} ${end.x},${end.y}`;
                                    } else {
                                        const midY = (start.y + end.y) / 2;
                                        pathD = `M${start.x},${start.y} C${start.x},${midY} ${end.x},${midY} ${end.x},${end.y}`;
                                    }

                                    return (
                                        <g 
                                            key={`conn-${i}-${conn.from}-${conn.to}`} 
                                            className="transition-all duration-500"
                                        >
                                            {/* Linha base - sempre visivel suavemente */}
                                            <path 
                                                d={pathD} 
                                                fill="none" 
                                                stroke={isActive ? hexColor : '#1e293b'} 
                                                strokeWidth={isActive ? 3 : 1.5} 
                                                style={{ 
                                                    opacity: isActive ? 0.9 : (activeNodeId ? 0.15 : 0.4), 
                                                    filter: isActive ? `drop-shadow(0 0 8px ${hexColor})` : 'none',
                                                    transition: 'all 0.4s ease'
                                                }} 
                                            />
                                            
                                            {/* Texto descritivo - so aparece na ativa ou sem selecao */}
                                            <text 
                                                x={(start.x + end.x)/2} 
                                                y={(start.y + end.y)/2 - 8} 
                                                fontSize="13" 
                                                fontWeight="700"
                                                fill={isActive ? '#fff' : '#475569'} 
                                                textAnchor="middle"
                                                className="hidden sm:block pointer-events-none"
                                                style={{ 
                                                    opacity: isActive ? 1 : (activeNodeId ? 0.1 : 0.7),
                                                    textShadow: isActive ? `0 0 10px ${hexColor}` : '0 2px 4px rgba(0,0,0,0.8)',
                                                    transition: 'all 0.4s ease'
                                                }}
                                            >
                                                {conn.desc}
                                            </text>

                                            {/* Bolinha animada - SEMPRE correndo, mais suave quando inativa */}
                                            <circle 
                                                r={isActive ? 4 : 2.5} 
                                                fill={isActive ? '#fff' : hexColor} 
                                                style={{ 
                                                    filter: isActive ? `drop-shadow(0 0 10px ${hexColor})` : 'none',
                                                    opacity: isActive ? 1 : 0.25,
                                                    transition: 'all 0.4s ease'
                                                }}
                                            >
                                                <animateMotion 
                                                    dur={`${2 + (i % 4) * 0.4}s`} 
                                                    repeatCount="indefinite" 
                                                    path={pathD} 
                                                    calcMode="linear"
                                                />
                                            </circle>
                                        </g>
                                    );
                                })}

                                {/* NOS - agora so o clicado + vizinhos diretos brilham */}
                                {Object.entries(topologyData.nodes).map(([key, node]) => {
                                    if(!node) return null;
                                    
                                    const nodeActive = isNodeActive(key);
                                    const isSelected = activeNodeId === key;
                                    const hexColor = getColor(node.color).hex;
                                    
                                    // Sem nada selecionado: tudo normal. Com selecao: ativos=brilho, inativos=suave
                                    const dimmed = activeNodeId && !nodeActive;

                                    return (
                                        <g 
                                            key={`node-${key}`} 
                                            onClick={(e) => { e.stopPropagation(); handleNodeClick(key); }} 
                                            className="cursor-pointer"
                                            style={{
                                                opacity: dimmed ? 0.25 : 1,
                                                transition: 'opacity 0.4s ease'
                                            }}
                                        >
                                            {/* Pulso radar - mais intenso no ativo */}
                                            <circle cx={node.x} cy={node.y} r="50" fill={hexColor} opacity="0">
                                                <animate 
                                                    attributeName="opacity" 
                                                    values={nodeActive ? "0;0.18;0" : "0;0.06;0"} 
                                                    dur="3s" 
                                                    repeatCount="indefinite" 
                                                    begin={`${(node.x % 5) / 5}s`} 
                                                />
                                                <animate 
                                                    attributeName="r" 
                                                    values={nodeActive ? "36;65;36" : "35;55;35"}

                    const hash = window.location.hash.replace('#', '');

                        const moduleId = hash.replace('module=', '');

                            setActiveModule(mod);

                        setView('grid');
                        setActiveModule(null);

                    window.scrollTo(0, 0);

                                        <span className="font-mono text-[10px] tracking-wide">Jogar</span>
                                    </a>
                                </div>
                            </div>
                        </header>

                        <div className="flex-1 relative min-h-0 flex flex-col">
                            {view === 'mindmap' ? (
                                <MindMapView onBack={backFromMindMap} />
                            ) : view === 'detail' && activeModule ? (
                                <DetailView module={activeModule} onBack={goBack} />
                            ) : (
                                <MainGrid onSelect={selectModule} />
                            )}
                        </div>
                    </div>

                    <div className="fixed bottom-0 left-0 w-full bg-[#020617]/90 backdrop-blur border-t border-slate-800/60 px-4 sm:px-6 py-2 z-50 flex justify-between items-center text-[10px] font-mono text-slate-500 uppercase tracking-wider select-none">
                        <div className="flex items-center gap-2 sm:gap-4">
                            <span className="flex items-center gap-2">
                                <span className="w-1.5 h-1.5 bg-emerald-500 rounded-full animate-pulse"></span>
                                SYSTEM: STABLE
                            </span>
                            <span className="hidden md:inline text-slate-600">MEM: 128.4 MB</span>
                            <span className="hidden md:inline text-slate-600">WORKERS: ACTIVE</span>
                        </div>
                        <div className="flex items-center gap-3">
                            <span className="text-slate-600 hidden sm:inline">SENTINELA OS v4.2</span>
                            <span className="text-cyan-500 animate-pulse">_</span>
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<AISystemLore />);
    </script>
</body>
</html>
