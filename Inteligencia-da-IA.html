        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Inter:wght@400;500;600;700;900&display=swap');

        * { -webkit-tap-highlight-color: transparent; }

        html, body { height: 100%; }
        body {
            font-family: 'Inter', sans-serif;
            background-color: #020617;
            color: #e2e8f0;
            margin: 0;
            overflow: hidden;
        }

        #root {
            height: 100dvh;
            overflow-y: auto;
            overflow-x: hidden;
            -webkit-overflow-scrolling: touch;
        }

        .font-mono { font-family: 'JetBrains Mono', monospace; }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(16px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-in { animation: fadeInUp 0.45s cubic-bezier(0.16, 1, 0.3, 1) forwards; }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-4px); }
        }
        .float { animation: float 4s ease-in-out infinite; }

        @keyframes pulse-glow {
            0%, 100% { opacity: 0.6; }
            50% { opacity: 1; }
        }
        .pulse-glow { animation: pulse-glow 2s ease-in-out infinite; }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 5px; height: 5px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #475569; }

        .custom-scrollbar::-webkit-scrollbar { width: 5px; height: 5px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }

        /* Glass card effect */
        .glass {
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }

        /* Circuit line animation - fluxo de dados nas linhas */
        @keyframes dash {
            to { stroke-dashoffset: -20; }
        }
        .circuit-line {
            stroke-dasharray: 4 4;
            animation: dash 1s linear infinite;
        }

        /* Fluxo de dados na linha - efeito correndo */
        @keyframes flowLine {
            from { stroke-dashoffset: 200; }
            to { stroke-dashoffset: 0; }
        }
        .flow-line {
            stroke-dasharray: 8 16;
            animation: flowLine 2s linear infinite;
        }
        .flow-line-fast {
            stroke-dasharray: 6 12;
            animation: flowLine 1.2s linear infinite;
        }

        /* Radar pulse no no - via CSS, nao SVG animate */
        @keyframes nodeRadar {
            0% { opacity: 0; r: 36; }
            50% { opacity: 0.15; }
            100% { opacity: 0; r: 65; }
        }
        .node-radar {
            animation: nodeRadar 3s ease-out infinite;
        }

        const TypewriterLog = ({ lines }) => {
            const [displayed, setDisplayed] = useState([]);
            const timeoutsRef = useRef([]);

            useEffect(() => {
                timeoutsRef.current.forEach(clearTimeout);
                timeoutsRef.current = [];
                setDisplayed([]);

                let lineIdx = 0;
                let charIdx = 0;

                const schedule = (fn, delay) => {
                    const id = setTimeout(fn, delay);
                    timeoutsRef.current.push(id);
                    return id;
                };

                const typeNext = () => {
                    if (lineIdx >= lines.length) return;
                    const line = lines[lineIdx];
                    const current = line.substring(0, charIdx + 1);
                    setDisplayed(prev => {
                        const next = [...prev];
                        next[lineIdx] = current;
                        return next;
                    });
                    charIdx++;
                    if (charIdx > line.length) {
                        lineIdx++;
                        charIdx = 0;
                        schedule(typeNext, 180);
                    } else {
                        schedule(typeNext, 22);
                    }
                };

                schedule(typeNext, 300);

                return () => {
                    timeoutsRef.current.forEach(clearTimeout);
                    timeoutsRef.current = [];
                };
            }, [lines]);

                        const moduleId = hash.replace('module=', '');

                    window.scrollTo(0, 0);

                                    </button>
                                    <a href="./"
                                        className="inline-flex items-center gap-2 px-3 py-1.5 rounded-lg border border-slate-700/50 bg-slate-900/50 text-xs text-slate-300 hover:border-emerald-500/50 hover:text-emerald-400 transition-all active:scale-95 glass">
                                        <span className="w-1.5 h-1.5 rounded-full bg-emerald-400 animate-pulse"></span>
                                        <span className="font-mono text-[10px] tracking-wide">Jogar</span>
                                    </a>
                                </div>
                            </div>
                        </header>

                        <div className="flex-1 relative min-h-0 flex flex-col">
                            {view === 'mindmap' ? (
                                <MindMapView onBack={backFromMindMap} />
                            ) : view === 'detail' && activeModule ? (
                                <DetailView module={activeModule} onBack={goBack} />
                            ) : (
                                <MainGrid onSelect={selectModule} />
                            )}
                        </div>
                    </div>

                    <div className="fixed bottom-0 left-0 w-full bg-[#020617]/90 backdrop-blur border-t border-slate-800/60 px-4 sm:px-6 py-2 z-50 flex justify-between items-center text-[10px] font-mono text-slate-500 uppercase tracking-wider select-none">
                        <div className="flex items-center gap-2 sm:gap-4">
                            <span className="flex items-center gap-2">
                                <span className="w-1.5 h-1.5 bg-emerald-500 rounded-full animate-pulse"></span>
                                SYSTEM: STABLE
                            </span>
                            <span className="hidden md:inline text-slate-600">MEM: 128.4 MB</span>
                            <span className="hidden md:inline text-slate-600">WORKERS: ACTIVE</span>
                        </div>
                        <div className="flex items-center gap-3">
                            <span className="text-slate-600 hidden sm:inline">SENTINELA OS v5.0 · SUPABASE/EDGE/HIVE</span>
                            <span className="text-cyan-500 animate-pulse">_</span>
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<AISystemLore />);
    </script>
</body>
</html>
