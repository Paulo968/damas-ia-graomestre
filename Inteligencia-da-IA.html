            to { opacity: 1; transform: translateY(0); }

        .animate-in { animation: fadeInUp 0.45s cubic-bezier(0.16, 1, 0.3, 1) forwards; }

        const TypewriterLog = ({ lines }) => {
            const [displayed, setDisplayed] = useState([]);
            const timeoutsRef = useRef([]);

            useEffect(() => {
                timeoutsRef.current.forEach(clearTimeout);
                timeoutsRef.current = [];
                setDisplayed([]);

                let lineIdx = 0;
                let charIdx = 0;

                const schedule = (fn, delay) => {
                    const id = setTimeout(fn, delay);
                    timeoutsRef.current.push(id);
                    return id;
                };

                const typeNext = () => {
                    if (lineIdx >= lines.length) return;
                    const line = lines[lineIdx];
                    const current = line.substring(0, charIdx + 1);
                    setDisplayed(prev => {
                        const next = [...prev];
                        next[lineIdx] = current;
                        return next;
                    });
                    charIdx++;
                    if (charIdx > line.length) {
                        lineIdx++;
                        charIdx = 0;
                        schedule(typeNext, 180);
                    } else {
                        schedule(typeNext, 22);
                    }
                };

                schedule(typeNext, 300);

                return () => {
                    timeoutsRef.current.forEach(clearTimeout);
                    timeoutsRef.current = [];
                };
            }, [lines]);

            const [activeNodeId, setActiveNodeId] = useState(null);
            const containerRef = useRef(null);
            const [mobileLayout, setMobileLayout] = useState(false);

            useEffect(() => {

            const getNodeData = (id) => {

            };

            const getPos = (desktopX, desktopY, mobileX, mobileY) => {
                return mobileLayout ? { x: mobileX, y: mobileY } : { x: desktopX, y: desktopY };

                    depth:         { ...getNodeData('depth_adapt'),      ...getPos(150, 400,  150, 700) },

                    telemetry:     { ...getNodeData('telemetry'),        ...getPos(466, 700,  300, 1000) },
                    context:       { ...getNodeData('context_speech'),   ...getPos(733, 700,  300, 1450) },
                    coach:         { ...getNodeData('coach'),            ...getPos(200, 700,  150, 1150) },
                    enhanced:      { ...getNodeData('context_enhanced'), ...getPos(1000, 700, 300, 1600) },
                    
                    consolidation: { ...getNodeData('consolidation'),    ...getPos(466, 1000, 450, 1150) },
                    persistence:   { ...getNodeData('state_persistence'),...getPos(733, 1000, 300, 1300) },
                    
                    edge:          { ...getNodeData('edge_intelligence'),...getPos(150, 1300, 150, 1750) },
                    book:          { ...getNodeData('opening_book'),     ...getPos(375, 1300, 450, 1750) },
                    ranking:       { ...getNodeData('ranking_profiles'), ...getPos(600, 1300, 300, 1900) },
                    online:        { ...getNodeData('online_realtime'),  ...getPos(825, 1300, 450, 2050) }
                },
                connections: [
                    { from: 'multicore', to: 'core', desc: 'Distribuição Chunks' },
                    { from: 'core', to: 'telemetry', desc: 'Envio Métricas' },
                    { from: 'core', to: 'depth', desc: 'Ajuste Horizonte' },
                    { from: 'core', to: 'time', desc: 'Orçamento Tempo' },
                    { from: 'core', to: 'symmetry', desc: 'Filtro Geométrico' },
                    { from: 'core', to: 'book', desc: 'Zobrist Lookup' },
                    { from: 'book', to: 'edge', desc: 'Miss -> Nuvem' },
                    { from: 'edge', to: 'telemetry', desc: 'Métricas Nuvem' },
                    { from: 'telemetry', to: 'coach', desc: 'Dados Partida' },
                    { from: 'multicore', to: 'consolidation', desc: 'Merge Pesos' },
                    { from: 'telemetry', to: 'persistence', desc: 'Sync Cloud' },
                    { from: 'consolidation', to: 'persistence', desc: 'Salvar Híbrido' },
                    { from: 'persistence', to: 'ranking', desc: 'Update Elo' },
                    { from: 'online', to: 'ranking', desc: 'PvP Result' },
                    { from: 'online', to: 'persistence', desc: 'Sync Board' },
                    { from: 'core', to: 'context', desc: 'Estado -> Fala' },
                    { from: 'context', to: 'enhanced', desc: 'Análise Extra' },
                    { from: 'context', to: 'taunts', desc: 'Modulador' },
                    { from: 'selector', to: 'taunts', desc: 'Preferência' },
                    { from: 'status', to: 'core', desc: 'Monitor' },
                    { from: 'core', to: 'debug', desc: 'Variáveis Livres' },
                    { from: 'reset', to: 'multicore', desc: 'Purga Memória' }
                ]
            };

            const padding = 150; 
            const nodesArr = Object.values(topologyData.nodes);
            const minX = Math.min(...nodesArr.map(n => n.x));
            const maxX = Math.max(...nodesArr.map(n => n.x));
            const minY = Math.min(...nodesArr.map(n => n.y));
            const maxY = Math.max(...nodesArr.map(n => n.y));
            const vbWidth = (maxX - minX) + (padding * 2);
            const vbHeight = (maxY - minY) + (padding * 2);
            const viewBox = `${minX - padding} ${minY - padding} ${vbWidth} ${vbHeight}`;

            const activeConnections = useMemo(() => {
                if (!activeNodeId) return [];
                return topologyData.connections.filter(c => c.from === activeNodeId || c.to === activeNodeId);
            }, [activeNodeId]);

            return (

                        onClick={(e) => {

                    >

                                viewBox={viewBox} 
                                preserveAspectRatio="xMidYMid meet" 
                                className="pointer-events-auto block mx-auto drop-shadow-2xl"
                                style={{

                                    minWidth: mobileLayout ? '800px' : '1200px', // Trava pro PC nunca ficar 'miúdo'

                                    height: 'auto', // Permite que a altura cresça naturalmente acompanhando a proporção
                                    background: 'radial-gradient(circle at 50% 20%, rgba(15,23,42,0.8) 0%, rgba(5,10,16,1) 80%)',
                                    borderRadius: mobileLayout ? '0px' : '24px',
                                    border: mobileLayout ? 'none' : '1px solid rgba(51, 65, 85, 0.4)'
                                }}
                                onClick={(e) => { if (e.target === e.currentTarget && activeNodeId) setActiveNodeId(null); }}

                                {/* Fundo Grid Cyberpunk */}
                                <defs>
                                    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
                                        <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(255,255,255,0.02)" strokeWidth="1"/>
                                    </pattern>
                                </defs>
                                <rect x={minX - padding} y={minY - padding} width={vbWidth} height={vbHeight} fill="url(#grid)" />

                                {/* Conexões (Efeito Circuito) */}
                                {topologyData.connections.map((conn, i) => {
                                    const start = topologyData.nodes[conn.from];
                                    const end = topologyData.nodes[conn.to];
                                    if(!start || !end) return null; 
                                    const isActive = activeNodeId && (conn.from === activeNodeId || conn.to === activeNodeId);
                                    const isDimmed = activeNodeId && !isActive;
                                    const hexColor = getColor(start.color).hex;

                                    const isHorizontal = Math.abs(start.y - end.y) < 50;
                                    let pathD;
                                    if (isHorizontal) {
                                        const midX = (start.x + end.x) / 2;
                                        pathD = `M${start.x},${start.y} C${midX},${start.y} ${midX},${end.y} ${end.x},${end.y}`;
                                    } else {
                                        const midY = (start.y + end.y) / 2;
                                        pathD = `M${start.x},${start.y} C${start.x},${midY} ${end.x},${midY} ${end.x},${end.y}`;
                                    }

                                    return (<g key={`conn-${i}-${conn.from}-${conn.to}`} className="transition-all duration-500" style={{opacity: isDimmed ? 0.05 : 1}}>

                                        <path d={pathD} fill="none" stroke={isActive ? hexColor : '#1e293b'} strokeWidth={isActive ? 3 : 1.5} style={{ opacity: isActive ? 0.8 : 0.4, filter: isActive ? `drop-shadow(0 0 6px ${hexColor})` : 'none' }} className="transition-all duration-500" />
                                        
                                        {/* Texto Descritivo */}
                                        <text 
                                            x={(start.x + end.x)/2} 
                                            y={(start.y + end.y)/2 - 8} 
                                            fontSize="13" 
                                            fontWeight="700"
                                            fill={isActive ? '#fff' : '#64748b'} 
                                            textAnchor="middle"
                                            className="hidden sm:block transition-colors pointer-events-none"
                                            style={{ textShadow: isActive ? `0 0 10px ${hexColor}` : '0 2px 4px rgba(0,0,0,0.8)' }}
                                        >
                                            {conn.desc}
                                        </text>

                                        {/* Animação do pacote de dados fluindo */}
                                        <circle r={isActive ? 4.5 : 2.5} fill={isActive ? '#fff' : hexColor} style={{ filter: isActive ? `drop-shadow(0 0 8px ${hexColor})` : 'none' }}>
                                            <animateMotion 
                                                dur={`${1.5 + (i % 3) * 0.5}s`} 
                                                repeatCount="indefinite" 
                                                path={pathD} 
                                                calcMode="linear"
                                            />
                                        </circle>
                                    </g>);
                                })}

                                {/* Nodes da Árvore */}
                                {Object.entries(topologyData.nodes).map(([key, node]) => {
                                    if(!node) return null;
                                    const isActive = activeNodeId === key;
                                    const isDimmed = activeNodeId && !isActive && !activeConnections.some(c => c.from === key || c.to === key);
                                    const hexColor = getColor(node.color).hex;

                                    return (
                                        <g key={`node-${key}`} onClick={(e) => { e.stopPropagation(); handleNodeClick(key); }} className="cursor-pointer transition-all duration-300" style={{opacity: isDimmed ? 0.15 : 1}}>
                                            {/* Pulso estilo radar */}
                                            <circle cx={node.x} cy={node.y} r="50" fill={hexColor} opacity="0">
                                                <animate attributeName="opacity" values="0;0.15;0" dur="3s" repeatCount="indefinite" begin={`${(node.x % 5) / 5}s`} />
                                                <animate attributeName="r" values="35;65;35" dur="3s" repeatCount="indefinite" begin={`${(node.y % 5) / 5}s`} />
                                            </circle>

                                            {/* Brilho Fundo */}
                                            <circle cx={node.x} cy={node.y} r={isActive ? 50 : 42} fill={hexColor} opacity={isActive ? "0.2" : "0.05"} className="transition-all duration-300" style={{ filter: isActive ? `drop-shadow(0 0 20px ${hexColor})` : 'none' }} />
                                            
                                            {/* Círculo Principal */}
                                            <circle cx={node.x} cy={node.y} r={isActive ? 42 : 36} fill="#050a10" stroke={hexColor} strokeWidth={isActive ? 4 : 2} className="transition-all duration-300 hover:stroke-white hover:stroke-[3px]" style={{ filter: isActive ? `drop-shadow(0 0 10px ${hexColor}80)` : 'drop-shadow(0 4px 6px rgba(0,0,0,0.5))' }} />

                                            {/* Ícone */}
                                            <foreignObject x={node.x - 16} y={node.y - 16} width="32" height="32">

                                            </foreignObject>

                                            {/* Label Text com Shadow mais forte */}
                                            <text x={node.x} y={node.y + 68} textAnchor="middle" fill={isActive ? "#fff" : hexColor} fontSize={isActive ? "15" : "13"} fontWeight="800" letterSpacing="1.5" style={{textShadow: isActive ? `0 0 12px ${hexColor}` : `0 3px 6px rgba(0,0,0,0.9)`}} className="pointer-events-none transition-all duration-300">{node.label}</text>
                                            
                                            {/* Status Dot Ajustado */}
                                            {node.status === 'ONLINE' && <circle cx={node.x + 28} cy={node.y - 28} r="5" fill="#22c55e" stroke="#050a10" strokeWidth="2" />}
                                            {node.status === 'AUTO' && <circle cx={node.x + 28} cy={node.y - 28} r="5" fill="#06b6d4" stroke="#050a10" strokeWidth="2" className="animate-pulse" />}
                                        </g>
                                    );
                                })}
                             </svg>
                         </div>
                         
                         {/* Painel Lateral Mobile/Desktop */}
                         {activeNodeId && (
                             <div className="fixed inset-0 md:absolute md:inset-auto md:right-0 md:top-0 md:bottom-0 w-full md:w-[400px] glass border-l border-slate-800 p-6 overflow-y-auto shadow-2xl animate-[fadeIn_0.3s_ease-out] z-50 custom-scrollbar pt-24">
                                
                                <button onClick={(e) => { e.stopPropagation(); setActiveNodeId(null); }} className="md:hidden flex items-center gap-2 text-slate-400 mb-6 bg-slate-800/50 p-3 rounded-lg active:scale-95 transition-transform duration-150 w-full justify-center border border-slate-700">
                                    <Icon name="ChevronLeft" size={16} /> 
                                    <span className="text-xs font-bold tracking-widest uppercase">Fechar Painel</span>
                                </button>

                                <div className="mb-6 pb-4 border-b border-slate-800">
                                    <h3 className="text-sm text-slate-500 font-mono uppercase mb-1">Nó Selecionado</h3>
                                    <h2 className="text-3xl font-black text-white tracking-tight" style={{color: getColor(topologyData.nodes[activeNodeId].color).hex}}>{topologyData.nodes[activeNodeId].title}</h2>
                                    <p className="text-xs text-slate-400 mt-2 font-mono">{topologyData.nodes[activeNodeId].creator.role}</p>
                                </div>
                                <div className="space-y-4">
                                    <div className="flex items-center gap-2 text-xs font-bold text-slate-500 uppercase tracking-wider"><div className="w-2 h-2 bg-green-500 rounded-full animate-pulse"></div>Fluxo de Dados Ativo</div>
                                    {activeConnections.map((conn, idx) => {
                                        const isOutgoing = conn.from === activeNodeId;
                                        const targetNode = topologyData.nodes[isOutgoing ? conn.to : conn.from];
                                        const tc = getColor(targetNode.color);

                                        return (
                                            <div key={idx} className="bg-[#050a10] border border-slate-800 rounded-xl p-4 hover:border-slate-600 transition-colors shadow-lg">
                                                <div className="flex items-center justify-between mb-3"><span className={`text-[10px] font-bold px-2 py-1 rounded ${isOutgoing ? 'bg-blue-500/10 text-blue-400 border border-blue-500/20' : 'bg-purple-500/10 text-purple-400 border border-purple-500/20'}`}>{isOutgoing ? 'ENVIANDO PARA' : 'RECEBENDO DE'}</span><Icon name="ArrowRight" size={14} className="text-slate-600" /></div>
                                                <div className="flex items-center gap-3 mb-2"><div className={`p-2 rounded-lg bg-slate-900 border border-slate-700 ${tc.text}`}><Icon name={targetNode.iconName} size={18} /></div><span className="font-bold text-sm text-slate-200">{targetNode.title}</span></div>
                                                <p className="text-xs text-slate-400 leading-relaxed border-t border-slate-900 pt-3 mt-2">"{conn.desc}"</p>
                                            </div>
                                        );
                                    })}
                                </div>
                             </div>
                         )}
                    </div>
                </div>
            );
        };

        // ============================================================
        // 📋 SUB-COMPONENTES DO DETAIL VIEW (v4.1 UI)
        // ============================================================
        const StatusBadge = ({ status }) => {
            const colors = {
                'ONLINE': 'bg-green-500/10 text-green-400 border-green-500/20',
                'AUTO': 'bg-cyan-500/10 text-cyan-400 border-cyan-500/20',
                'SYSTEM': 'bg-amber-500/10 text-amber-400 border-amber-500/20',
                'DEV ONLY': 'bg-amber-500/10 text-amber-400 border-amber-500/20'
            };
            const dotColors = { 'ONLINE': 'bg-green-500', 'AUTO': 'bg-cyan-500', 'SYSTEM': 'bg-amber-500', 'DEV ONLY': 'bg-amber-500' };
            return (
                <span className={`inline-flex items-center gap-1.5 px-2 py-1 rounded-full border text-[10px] font-bold uppercase tracking-wider ${colors[status] || colors['ONLINE']}`}>
                    <span className={`w-1.5 h-1.5 rounded-full ${dotColors[status] || dotColors['ONLINE']} ${status === 'AUTO' ? 'animate-pulse' : ''}`}></span>
                    {status}
                </span>
            );
        };

        const ComplexityBar = ({ value, colorKey }) => {
            const c = getColor(colorKey);
            return (
                <div className="bg-slate-900 border border-slate-800 rounded-xl p-4">
                    <h3 className="text-xs font-bold text-slate-500 uppercase tracking-wider mb-3 flex items-center gap-2">
                        <Icon name="BarChart" size={13} /> Carga Computacional
                    </h3>
                    <div className="relative h-2 bg-slate-800 rounded-full overflow-hidden mb-2">
                        <div className={`absolute top-0 left-0 h-full bg-gradient-to-r from-slate-500 ${c.gradient} transition-all duration-1000`}
                            style={{ width: `${value || 50}%` }}></div>
                    </div>
                    <div className="flex justify-between text-[10px] font-mono text-slate-500">
                        <span>Idle</span><span>Max Load: {value}%</span>
                    </div>
                </div>
            );
        };

        const CreatorCard = ({ creator, colorKey }) => {
            const c = getColor(colorKey);
            return (
                <div className="bg-slate-900 border border-slate-800 rounded-xl p-5 relative overflow-hidden">
                    <div className={`absolute top-0 right-0 w-20 h-20 bg-gradient-to-bl ${c.gradient} to-transparent opacity-15 rounded-bl-full pointer-events-none`}></div>
                    <h3 className="text-xs font-bold text-slate-500 uppercase tracking-wider mb-4 flex items-center gap-2">
                        <Icon name="User" size={13} /> Gênese Teórica
                    </h3>
                    <div className="flex items-start gap-3 mb-4">
                        <div className="w-10 h-10 rounded-full bg-slate-950 flex items-center justify-center border border-slate-800 shrink-0">
                            <Icon name="Code2" size={17} className="text-slate-400" />
                        </div>
                        <div>
                            <p className="text-sm font-bold text-white">{creator.name}</p>
                            <p className="text-[10px] text-slate-500 uppercase font-mono tracking-wide">{creator.role} // {creator.year}</p>
                        </div>
                    </div>
                    <div className="space-y-3">
                        <div className="bg-slate-950/60 rounded-lg p-3 border border-slate-800/50">
                            <div className="flex items-center gap-2 mb-2">
                                <Icon name="Lightbulb" size={11} className={c.text} />
                                <span className={`text-[10px] font-bold uppercase ${c.text}`}>A Origem</span>
                            </div>
                            <p className="text-xs text-slate-400 italic leading-relaxed">"{creator.reason}"</p>
                        </div>
                        <div className="bg-slate-950/60 rounded-lg p-3 border border-slate-800/50">
                            <div className="flex items-center gap-2 mb-2">
                                <Icon name="Target" size={11} className={c.text} />
                                <span className={`text-[10px] font-bold uppercase ${c.text}`}>Implementação</span>
                            </div>
                            <p className="text-xs text-slate-300 leading-relaxed">{creator.usage}</p>
                        </div>
                    </div>
                </div>
            );
        };

        const LogTerminal = ({ logs, colorKey }) => {
            const c = getColor(colorKey);
            return (
                <div className="bg-black border border-slate-800 rounded-xl p-4 font-mono text-[10px] h-36 overflow-hidden flex flex-col shadow-inner">
                    <div className="text-slate-600 mb-2 flex justify-between items-center">
                        <span>root@sentinela:~# log --tail</span>
                        <Icon name="Zap" size={10} className={c.text} />
                    </div>
                    <div className={`flex-1 overflow-hidden ${c.text}`}>
                        <TypewriterLog lines={logs} />
                    </div>
                </div>
            );
        };

        // ============================================================
        // 📄 DETAIL VIEW (v4.1 Layout)
        // ============================================================
        const DetailView = ({ module, onBack }) => {
            if (!module) return null;
            const c = getColor(module.color);
            const isStatusGuide = module.id === 'status_guide';

            return (
                <div className="animate-in flex-1 min-h-0 flex flex-col">
                    <div className="flex-1 min-h-0 pb-32 pr-2 custom-scrollbar overflow-y-auto">
                        <div className="grid grid-cols-1 lg:grid-cols-12 gap-6">
                            {/* Coluna principal */}
                            <div className="lg:col-span-8 space-y-5">
                                {/* Título + Metadados */}
                                <div className="flex flex-col sm:flex-row items-start gap-5">
                                    <div className={`p-5 rounded-2xl bg-slate-900 border-2 ${c.border} shadow-lg shrink-0`}>
                                        <Icon name={module.iconName} size={48} className={c.text} />
                                    </div>
                                    <div className="flex-1 min-w-0">
                                        <h2 className="text-2xl sm:text-3xl md:text-4xl font-black text-white uppercase tracking-tight mb-2 leading-none">
                                            {module.title}
                                        </h2>
                                        <div className="flex flex-wrap items-center gap-2 mb-3">
                                            <span className={`px-2 py-1 rounded bg-slate-950 border border-slate-800 text-[10px] font-bold uppercase tracking-widest ${c.text}`}>
                                                {module.type}
                                            </span>
                                            <StatusBadge status={module.status} />
                                        </div>
                                        <div className="flex flex-wrap gap-2">
                                            {module.langs.map((lang, i) => (
                                                <span key={i} className="px-2 py-1 rounded bg-slate-950 border border-slate-800 text-[10px] font-mono text-slate-400 flex items-center gap-1">
                                                    <Icon name="Code2" size={9} /> {lang}
                                                </span>
                                            ))}
                                        </div>
                                    </div>
                                </div>

                                {/* Lore / Arquivo de Sistema */}
                                <div className="bg-slate-900/50 border border-slate-800 rounded-xl p-5 md:p-6 relative overflow-hidden">
                                    <div className={`absolute inset-0 bg-gradient-to-br ${c.gradient} to-transparent opacity-10 pointer-events-none`}></div>
                                    <div className="relative z-10">
                                        <h3 className="text-sm font-bold text-slate-200 uppercase tracking-wider mb-3 flex items-center gap-2">
                                            <Icon name="History" size={15} className={c.text} /> Arquivo de Sistema
                                        </h3>
                                        <p className="text-slate-300 leading-relaxed font-light text-sm md:text-base">{module.lore}</p>
                                        {isStatusGuide && (
                                            <div className="mt-5 grid grid-cols-1 sm:grid-cols-3 gap-3">
                                                {[
                                                    { color: 'green', label: 'VERDE', desc: 'ONLINE / Operacional' },
                                                    { color: 'cyan', label: 'CIANO', desc: 'AUTO / Dinâmico' },
                                                    { color: 'amber', label: 'ÂMBAR', desc: 'SYSTEM / DEV ONLY' }
                                                ].map(s => (
                                                    <div key={s.color} className={`bg-slate-950/50 p-3 rounded border border-${s.color}-900/30 flex items-center gap-3`}>
                                                        <div className={`w-3 h-3 bg-${s.color}-500 rounded-full shadow-[0_0_8px] shadow-${s.color}-500/50 animate-pulse`}></div>
                                                        <div>
                                                            <div className={`text-xs font-bold text-${s.color}-400`}>{s.label}</div>
                                                            <div className="text-[10px] text-slate-400">{s.desc}</div>
                                                        </div>
                                                    </div>
                                                ))}
                                            </div>
                                        )}
                                    </div>
                                </div>
                            </div>

                            {/* Sidebar */}
                            <div className="lg:col-span-4 space-y-4">
                                <ComplexityBar value={module.complexity} colorKey={module.color} />
                                <CreatorCard creator={module.creator} colorKey={module.color} />
                                <LogTerminal logs={module.logs} colorKey={module.color} />
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        // ============================================================
        // 🏠 MAIN GRID (v4.1 Hover Effects)
        // ============================================================
        const MainGrid = ({ onSelect }) => (
            <div className="flex-1 min-h-0 pb-28 pr-2 custom-scrollbar overflow-y-auto">
                <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4 animate-in">
                    {modules.map((mod, i) => {
                        const c = getColor(mod.color);
                        return (
                            <div key={mod.id} onClick={() => onSelect(mod)}
                                className={`group cursor-pointer bg-slate-900/40 border border-slate-800/50 rounded-xl p-5 
                                    transition-all duration-200 hover:-translate-y-1 hover:bg-slate-900 hover:border-slate-700 hover:shadow-xl active:scale-[0.98]`}
                                style={{ animationDelay: `${i * 40}ms` }}>
                                <div className="flex justify-between items-start mb-4">
                                    <div className={`p-3 rounded-lg bg-slate-950 border border-slate-800 transition-colors group-hover:border-slate-700`}>
                                        <Icon name={mod.iconName} size={22} className={c.text} />
                                    </div>
                                    {mod.status === 'ONLINE' && <div className="w-2 h-2 bg-green-500 rounded-full shadow-[0_0_6px_#22c55e]"></div>}
                                    {mod.status === 'AUTO' && <div className="w-2 h-2 bg-cyan-500 rounded-full shadow-[0_0_6px_#06b6d4] animate-pulse"></div>}
                                    {(mod.status !== 'ONLINE' && mod.status !== 'AUTO') && <div className="w-2 h-2 bg-amber-500 rounded-full shadow-[0_0_6px_#f59e0b]"></div>}
                                </div>
                                <h3 className="text-lg font-bold text-slate-200 mb-1 group-hover:text-white transition-colors">{mod.title}</h3>
                                <p className="text-[10px] font-mono text-slate-500 uppercase tracking-wider">{mod.type}</p>
                            </div>
                        );
                    })}
                </div>
            </div>
        );

        // ============================================================
        // 🎯 APP PRINCIPAL (com hash-based routing v4.1)
        // ============================================================
        function AISystemLore() {
            const [activeModule, setActiveModule] = useState(null);
            const [view, setView] = useState('grid'); // 'grid' | 'detail' | 'mindmap'

            // 🗝️ HASH ROUTING: lê e escreve a URL hash
            useEffect(() => {
                window.scrollTo(0, 0);
                const rootEl = document.getElementById('root');
                if (rootEl) rootEl.scrollTop = 0;

                const parseHash = () => {
                    const hash = window.location.hash.replace('#', '');
                    if (hash === 'mindmap') {
                        setView('mindmap');
                        setActiveModule(null);
                    } else if (hash.startsWith('module=')) {
                        const moduleId = hash.replace('module=', '');
                        const mod = modules.find(m => m.id === moduleId);
                        if (mod) {
                            setActiveModule(mod);
                            setView('detail');
                        }
                    } else {
                        setView('grid');
                        setActiveModule(null);
                    }
                    window.scrollTo(0, 0);
                    if (rootEl) rootEl.scrollTop = 0;
                };
                parseHash();
                window.addEventListener('hashchange', parseHash);
                return () => window.removeEventListener('hashchange', parseHash);
            }, []);

            const selectModule = useCallback((mod) => {
                setActiveModule(mod);
                setView('detail');
                window.location.hash = `module=${mod.id}`;
                window.scrollTo(0, 0);
                const rootEl = document.getElementById('root');
                if (rootEl) rootEl.scrollTop = 0;
            }, []);

            const goBack = useCallback(() => {
                setActiveModule(null);
                setView('grid');
                window.location.hash = '';
                window.scrollTo(0, 0);
                const rootEl = document.getElementById('root');
                if (rootEl) rootEl.scrollTop = 0;
            }, []);

            const openMindMap = useCallback(() => {
                setView('mindmap');
                setActiveModule(null);
                window.location.hash = 'mindmap';
                window.scrollTo(0, 0);
                const rootEl = document.getElementById('root');
                if (rootEl) rootEl.scrollTop = 0;
            }, []);

            const backFromMindMap = useCallback(() => {
                setView('grid');
                window.location.hash = '';
                window.scrollTo(0, 0);
                const rootEl = document.getElementById('root');
                if (rootEl) rootEl.scrollTop = 0;
            }, []);

            return (
                <div className="flex-1 flex flex-col text-slate-200 font-sans selection:bg-cyan-500/30 bg-[#050a10]">
                    <div className="flex-1 max-w-7xl w-full mx-auto p-4 sm:p-6 relative z-10 flex flex-col pb-20">
                        {/* Header persistente em todas as views */}
                        <header className={`shrink-0 mb-5 border-b border-slate-800/50 pb-4 animate-in ${view === 'mindmap' ? 'relative z-[100]' : ''}`}>
                            <div className="flex flex-col md:flex-row md:items-end justify-between gap-4">
                                <div className="flex items-center gap-3">
                                    {view !== 'grid' && (
                                        <button onClick={view === 'mindmap' ? backFromMindMap : goBack}
                                            className="flex items-center gap-2 text-slate-400 hover:text-white transition-all active:scale-95 group px-3 py-2 rounded-lg hover:bg-slate-900/80 glass">
                                            <Icon name="ChevronLeft" className="group-hover:-translate-x-1 transition-transform" size={18} />
                                            <span className="text-xs font-mono uppercase tracking-widest hidden sm:inline">
                                                Voltar ao Hub
                                            </span>
                                        </button>
                                    )}
                                    <div>
                                        <div className="inline-flex items-center gap-2 px-2.5 py-1 rounded-full bg-slate-900 border border-slate-800 text-cyan-500 text-[10px] font-mono uppercase tracking-widest mb-2">
                                            <Icon name="Terminal" size={9} /> v4.1 Guide
                                        </div>
                                        <h1 className="text-2xl sm:text-3xl md:text-4xl font-black text-white tracking-tighter flex items-center gap-3">
                                            <span className="text-slate-300 tracking-widest">DAMAS</span>
                                            <span className="text-sm text-slate-600 font-mono">vs</span>
                                            <span className="font-mono text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 to-purple-500 float">IA_</span>
                                        </h1>
                                    </div>
                                </div>
                                <div className="flex items-center gap-3 relative z-10">
                                    <button onClick={view === 'mindmap' ? backFromMindMap : openMindMap}
                                        className={`inline-flex items-center gap-2 px-3 py-1.5 rounded-lg border transition-all active:scale-95 ${view === 'mindmap' ? 'border-blue-500/50 text-blue-400 bg-blue-500/10 glass' : 'border-slate-700/50 bg-slate-900/50 text-slate-300 hover:border-blue-500/50 hover:text-blue-400 glass'}`}>
                                        <Icon name="Network" size={13} />
                                        <span className="font-mono text-[10px] tracking-wide">Topologia</span>
                                    </button>
                                    <a href="./"
                                        className="inline-flex items-center gap-2 px-3 py-1.5 rounded-lg border border-slate-700/50 bg-slate-900/50 text-xs text-slate-300 hover:border-emerald-500/50 hover:text-emerald-400 transition-all active:scale-95 glass">
                                        <span className="w-1.5 h-1.5 rounded-full bg-emerald-400 animate-pulse"></span>
                                        <span className="font-mono text-[10px] tracking-wide">Jogar</span>
                                    </a>
                                </div>
                            </div>
                        </header>

                        {/* View Router */}
                        <div className="flex-1 relative min-h-0 flex flex-col">
                            {view === 'mindmap' ? (
                                <MindMapView onBack={backFromMindMap} />
                            ) : view === 'detail' && activeModule ? (
                                <DetailView module={activeModule} onBack={goBack} />
                            ) : (
                                <MainGrid onSelect={selectModule} />
                            )}
                        </div>
                    </div>

                    {/* Footer Bar */}
                    <div className="fixed bottom-0 left-0 w-full bg-[#020617]/90 backdrop-blur border-t border-slate-800/60 px-4 sm:px-6 py-2 z-50 flex justify-between items-center text-[10px] font-mono text-slate-500 uppercase tracking-wider select-none">
                        <div className="flex items-center gap-2 sm:gap-4">
                            <span className="flex items-center gap-2">
                                <span className="w-1.5 h-1.5 bg-emerald-500 rounded-full animate-pulse"></span>
                                SYSTEM: STABLE
                            </span>
                            <span className="hidden md:inline text-slate-600">MEM: 128.4 MB</span>
                            <span className="hidden md:inline text-slate-600">WORKERS: ACTIVE</span>
                        </div>
                        <div className="flex items-center gap-3">
                            <span className="text-slate-600 hidden sm:inline">SENTINELA OS v4.1</span>
                            <span className="text-cyan-500 animate-pulse">_</span>
                        </div>
                    </div>
                </div>
            );
        }

        // ============================================================
        // 🚀 MONTAGEM
        // ============================================================
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<AISystemLore />);
    </script>
</body>
</html>
